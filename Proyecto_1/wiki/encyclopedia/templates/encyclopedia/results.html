{% extends "encyclopedia/layout.html" %}

{% block title %}
Encyclopedia | Search
{% endblock %}

{% block body %}
<h1>Results for your search "{{ entry }}"</h1>

<ul>
{% for entry in results %}
    <li>
        <a href="{% url 'entry' entry %}">{{ entry }}</a>
    </li>
{% endfor %}
</ul>
{% endblock %}
